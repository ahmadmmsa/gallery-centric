services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gallery_centric_app
    depends_on:
      gallerydb:
        condition: service_healthy
    # All configuration comes from .env. Secrets (SECRET_KEY, ALTCHA_HMAC_KEY)
    # are generated at first launch and stored encrypted in the database; the
    # admin password is generated at first launch and printed to the logs.
    env_file:
      - .env
    ports:
      - "8008:8008"
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/docs')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gallery_centric_network
    restart: unless-stopped

  gallerydb:
    image: pgvector/pgvector:pg18
    container_name: gallery_centric_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # PG18 stores data in a version-specific subdir; mount the parent so the
      # image manages the layout (recommended for pg_upgrade compatibility).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - gallery_centric_network

  nginx:
    image: nginx:alpine
    container_name: gallery_centric_nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/app/static:ro
    networks:
      - gallery_centric_network
    restart: unless-stopped
    profiles:
      - production

networks:
  gallery_centric_network:
    driver: bridge

volumes:
  pgdata: