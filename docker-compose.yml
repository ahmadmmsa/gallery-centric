services:
  # Generates data/db_password on first boot (idempotent, then exits). The
  # password is alphanumeric so it is safe to embed in a database URL, and the
  # file is chmod 600. Both the app and PostgreSQL read this same file — no
  # .env needed.
  db-init:
    image: alpine:3.20
    container_name: gallery_centric_db_init
    command: >
      sh -c 'test -s /data/db_password ||
             (umask 077 &&
              tr -dc A-Za-z0-9 < /dev/urandom | head -c 48 > /data/db_password &&
              echo "[db-init] Generated new database password in data/db_password")'
    volumes:
      - ./data:/data
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gallery_centric_app
    depends_on:
      db-init:
        condition: service_completed_successfully
      gallerydb:
        condition: service_healthy
    ports:
      - "8008:8008"
    volumes:
      - ./app:/app/app
      - ./media:/app/media
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./data:/app/data:ro
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/docs')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gallery_centric_network
    restart: unless-stopped

  gallerydb:
    image: pgvector/pgvector:pg18
    container_name: gallery_centric_db
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: gallery
      POSTGRES_DB: gallery
      POSTGRES_PASSWORD_FILE: /run/gallery/db_password
    volumes:
      - pgdata:/var/lib/postgresql
      - ./data:/run/gallery:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gallery -d gallery"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - gallery_centric_network

  nginx:
    image: nginx:alpine
    container_name: gallery_centric_nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/app/static:ro
    networks:
      - gallery_centric_network
    restart: unless-stopped
    profiles:
      - production

networks:
  gallery_centric_network:
    driver: bridge

volumes:
  pgdata:
