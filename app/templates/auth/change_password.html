{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center auth-wrap">
  <div class="w-100 p-4 p-sm-5 bg-dark border border-secondary rounded-4 auth-card">

    <div class="text-center mb-4">
      <h2 class="fw-bold text-white mb-1">Set a New Password</h2>
      {% if forced %}
      <p class="text-warning small mb-0">
        <i class="bi bi-shield-lock"></i> You must change the auto-generated password before continuing.
      </p>
      {% endif %}
    </div>

    {% if error %}
    <div class="alert alert-danger bg-danger bg-opacity-10 border-danger text-danger rounded-3 d-flex align-items-start gap-2 small p-3 mb-4" role="alert">
      <i class="bi bi-exclamation-triangle-fill flex-shrink-0 mt-0.5"></i>
      <span class="fw-medium">{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="/auth/change-password">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">

      <div class="mb-3">
        <label class="form-label text-uppercase text-muted fw-semibold mb-1 auth-label">New Password</label>
        <input type="password" name="new_password" minlength="8" required autofocus
               class="form-control form-control-lg bg-transparent border-secondary text-white auth-input"
               placeholder="••••••••" />
      </div>

      <div class="mb-4">
        <label class="form-label text-uppercase text-muted fw-semibold mb-1 auth-label">Confirm Password</label>
        <input type="password" name="confirm_password" minlength="8" required
               class="form-control form-control-lg bg-transparent border-secondary text-white auth-input"
               placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-bold">
        Update Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
