{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
  <div class="w-100 p-4 p-sm-5 bg-dark border border-secondary rounded-4" style="max-width: 440px;">

    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-primary" style="font-size: 2.5rem;"></i>
      <h2 class="fw-bold text-white mt-2 mb-1">Welcome — First-Time Setup</h2>
      <p class="text-muted small mb-0">
        Set a password for the administrator account
        <span class="text-white fw-semibold">{{ admin_username }}</span> to get started.
      </p>
    </div>

    {% if error %}
    <div class="alert alert-danger bg-danger bg-opacity-10 border-danger text-danger rounded-3 d-flex align-items-start gap-2 small p-3 mb-4" role="alert">
      <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
      <span class="fw-medium">{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="/setup">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">

      <div class="mb-3">
        <label class="form-label text-uppercase text-muted fw-semibold mb-1" style="font-size: 0.75rem;">Admin Password</label>
        <input type="password" name="new_password" minlength="8" required autofocus
               class="form-control form-control-lg bg-transparent border-secondary text-white"
               style="font-size: 0.9rem;" placeholder="At least 8 characters" />
      </div>

      <div class="mb-4">
        <label class="form-label text-uppercase text-muted fw-semibold mb-1" style="font-size: 0.75rem;">Confirm Password</label>
        <input type="password" name="confirm_password" minlength="8" required
               class="form-control form-control-lg bg-transparent border-secondary text-white"
               style="font-size: 0.9rem;" placeholder="Re-enter password" />
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-bold">
        Create Admin &amp; Continue
      </button>
    </form>
  </div>
</div>
{% endblock %}
