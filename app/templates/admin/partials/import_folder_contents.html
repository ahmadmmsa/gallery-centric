<div class="card bg-dark border-secondary">
    <div class="card-header border-secondary d-flex justify-content-between align-items-center bg-black bg-opacity-25">
        <h6 class="mb-0 text-truncate"><i class="bi bi-folder-check text-success me-2"></i> <strong>{{ folder_name }}</strong></h6>
        <form method="post" action="/admin/galleries/{{ gallery.id }}/import-folder" id="importFolderForm">
            <input type="hidden" name="folder_name" value="{{ folder_name }}">
            <button type="submit" class="btn btn-sm btn-success">
                <i class="bi bi-cloud-arrow-down me-1"></i> Import Images to Gallery
            </button>
        </form>
    </div>
    <div class="card-body p-2" style="max-height: 400px; overflow-y: auto;">
        <div class="row g-2">
            {% for image in images %}
            <div class="col-4 col-sm-3 col-md-2">
                <div class="ratio ratio-1x1 bg-black rounded">
                    <img src="{{ image }}" class="rounded object-fit-cover w-100 h-100" loading="lazy" alt="Preview">
                </div>
            </div>
            {% endfor %}
            {% if not images %}
            <div class="col-12 text-center py-4 text-muted">
                <i class="bi bi-image text-secondary fs-1 d-block mb-2"></i>
                No compatible images found
            </div>
            {% endif %}
        </div>
    </div>
</div>

<script>
document.getElementById('importFolderForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Importing...';
    
    try {
        const formData = new FormData(this);
        const response = await fetch(this.action, {
            method: 'POST',
            body: formData
        });
        
        if (response.ok) {
            btn.classList.replace('btn-success', 'btn-primary');
            btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Success!';
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        } else {
            const err = await response.json();
            alert('Import Failed: ' + (err.detail || 'Unknown error'));
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    } catch (err) {
        console.error('Import error:', err);
        alert('Network error.');
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
});
</script>
