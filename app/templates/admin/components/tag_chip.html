<span class="badge bg-primary me-2 mb-2 d-inline-flex align-items-center tag-chip">
    {{ item.name }}

    <button type="button" class="btn-close btn-close-white ms-2"
        onclick="this.parentElement.remove()">
    </button>

    <input type="hidden" name="{{ field_name if field_name else type + '_ids' }}" value="{{ item.id }}">
</span>
{% if clear_input %}
<script>
    (function () {
        var searchInput = document.getElementById('{{ type }}-search');
        if (searchInput) {
            searchInput.value = '';
            searchInput.focus();
        }
        var resultsDiv = document.getElementById('{{ type }}-results');
        if (resultsDiv) {
            resultsDiv.innerHTML = '';
        }
    })();
</script>
{% endif %}
