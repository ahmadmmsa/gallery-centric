<span class="badge bg-danger me-2 mb-2 d-inline-flex align-items-center text-white shadow-sm"
      style="font-size: 0.9em; padding: 0.3em 0.5em; animation: errorFadeInOut 3.5s forwards;"
      onanimationend="this.remove()">
    
    <i class="bi bi-exclamation-triangle-fill me-2"></i> 
    
    {{ msg }}
</span>

<style>
    @keyframes errorFadeInOut {
        0% { opacity: 0; transform: translateY(-5px) scale(0.95); }
        10% { opacity: 1; transform: translateY(0) scale(1); }
        80% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-5px) scale(0.95); }
    }
</style>
