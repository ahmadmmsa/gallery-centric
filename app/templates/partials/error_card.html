<div class="alert alert-danger border-danger border-opacity-25 bg-danger bg-opacity-10 p-4 rounded-3 my-3 text-center shadow-sm w-100">
    <div class="mb-3 text-danger">
        <i class="bi bi-database-slash" style="font-size: 2.5rem;"></i>
    </div>
    <h4 class="alert-heading fw-bold text-light">Connection Error</h4>
    <p class="mb-3 text-muted small mx-auto" style="max-width: 500px;">
        {{ message or "The connection to our database was temporarily lost. Please reload this component or try again later." }}
    </p>
    <div class="d-flex justify-content-center gap-2">
        <button onclick="window.location.reload();" class="btn btn-sm btn-danger px-3 rounded-pill">
            <i class="bi bi-arrow-clockwise me-1"></i> Try Reloading
        </button>
    </div>
</div>
