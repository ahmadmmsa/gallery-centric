<div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg border-0 rounded-4 bg-dark">
      <div class="modal-header border-bottom-0 pb-0" id="confirmModalHeader">
        <h5 class="modal-title fw-bold d-flex align-items-center gap-2" id="confirmModalLabel">
          <i class="bi bi-exclamation-triangle-fill" id="confirmModalIcon"></i>
          <span>Confirm Action</span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body py-3 bg-dark">
        <p id="confirmModalMessage" class="mb-0 text-secondary">
          Are you sure you want to continue?
        </p>
      </div>
      <div class="modal-footer border-top-0 pt-0 bg-dark">
        <button type="button" class="btn btn-light border-0 px-3 bg-secondary bg-opacity-10 text-reset" data-bs-dismiss="modal">
          Cancel
        </button>
        <button type="button" class="btn btn-danger px-4" id="confirmModalOk">
          Confirm
        </button>
      </div>
    </div>
  </div>
</div>
